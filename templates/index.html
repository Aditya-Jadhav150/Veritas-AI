  <body>
    <div id="root"></div>
    <!-- Inject Floating Admin Button for adityajadhav300405@gmail.com -->
    {% if user and user.email and user.email.strip().lower() == 'adityajadhav300405@gmail.com' %}

      .admin-float-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
        color: #e0e0e0;

        border-color: #555;
        color: #fff;
      }

        height: 18px;
        fill: currentColor;
      }
    </style>
    <a href="/aegis-override-system" class="admin-float-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-2.92 8.97-7 10.1-4.08-1.13-7-5.43-7-10.1V6.3l7-3.12zm0 2.82c-1.66 0-3 1.34-3 3 0 1.2.72 2.22 1.75 2.72L10.5 16h3l-.25-4.28c1.03-.5 1.75-1.52 1.75-2.72 0-1.66-1.34-3-3-3z"/></svg>
      Admin Portal
    </a>
    {% endif %}

    <!-- Sync React App's Option-in LocalStorage with Backend Database -->
    <script>
      (function() {
        function syncOptInToBackend(optInValue) {
          fetch('/api/update_optin', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ai_data_optin: optInValue })
          }).catch(err => console.error("Sync failed", err));
        }

        // Intercept LocalStorage .setItem calls from the React UI
        const originalSetItem = localStorage.setItem;
        localStorage.setItem = function(key, value) {
          originalSetItem.apply(this, arguments);
          if (key === 'veritas_settings') {
            try {
              const settings = JSON.parse(value);
              if (settings.optIn !== undefined) {
                syncOptInToBackend(settings.optIn);
              }
            } catch(e) {}
          }
        };

        // Sync initially upon page load in case it drifted
        document.addEventListener('DOMContentLoaded', () => {
          try {
            const raw = localStorage.getItem('veritas_settings');
            if (raw) {
              const parsed = JSON.parse(raw);
              if (parsed.optIn !== undefined) {
                syncOptInToBackend(parsed.optIn);
              }
            }
          } catch(e) {}
        });
      })();
    </script>
  </body>
</html>
