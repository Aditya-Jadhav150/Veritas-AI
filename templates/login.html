<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas-AI - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="auth-container glass-panel">
        <div class="auth-header">
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i>
                <h2>Veritas-AI</h2>
            </div>
            <p>Advanced Deepfake Detection</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
            <h3 class="form-title">Welcome Back</h3>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="login-username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-password" placeholder="Password" required>
            </div>
            <div id="login-error" class="error-msg"></div>
            <button type="submit" class="btn primary-btn">Login <i class="fa-solid fa-arrow-right"></i></button>
            <p class="auth-switch">Don't have an account? <span onclick="toggleAuth()">Sign up</span></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form" style="display: none;">
            <h3 class="form-title">Create Account</h3>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="register-username" placeholder="Username (min 3 chars)" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="register-password" placeholder="Password" required>
            </div>
            <div id="register-error" class="error-msg"></div>
            <button type="submit" class="btn primary-btn">Register <i class="fa-solid fa-user-plus"></i></button>
            <p class="auth-switch">Already have an account? <span onclick="toggleAuth()">Login</span></p>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
